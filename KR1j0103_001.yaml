body:
  text: 字指衢郭忠恕汗簡卷上上之二引李彤集字穽同上決同上引李彤字略倏爚電光也弋灼切文選班孟堅西都賦注礣砎雷大聲也釋元應憎祗律音義水別流為派文選左太沖吳都都賦注引李彤字說濤大波也瀨急湍也𡵉禿山也五骨切並同上搦按也文選左太沖魏都賦注引字說礚大聲也口蓋切文選楊子雲甘泉賦注河內有𨜓亭音潁史記惠景間侯者年表司馬貞索隱引李彤楩木似豫章陸德明爾雅釋文鰡鯊屬文選張平子歸田賦注鷓鴣鳥其鳴自呼但南不北形如雌雉釋元應善見律音義翡翠南方取之因其生子漸下其巢頂可取之皆取其羽也同上鵔鸃神鳥飛光竟天史記司馬相如傳索隱引李彤弔鳥山俗傳曰鳳死其上每至七月九日臨望群鳥常來集其上鳴呼也太平御覽卷二十五又卷九百十五引李彤四部嶜崟高大貌文選卷八揚子雲羽獵賦注引李彤單行字青熒光明貌同上
